<script>

// Supabase에서 표준원가 로드
async function t3LoadStdCostFromSB() {
  try {
    const rows = await sb3('repaint_stdcost?select=*');
    rows.forEach(r => {
      T3.monthStdCost[r.month] = { fileName: r.file_name, data: r.data };
    });
    // [추가] 로드 후 상단 태그 업데이트
    t3UpdateStdSavedList();
  } catch(e) { console.error('표준원가 로드 오류:', e); }
}

// Supabase에서 전체 실적 로드
async function t3LoadSessions() {
  try {
    const sessions = await sb3('repaint_sessions?select=id,month,scrap_price,created_at,repaint_items(id,name,thickness,size,qty,repaint,stdcost)&order=created_at.desc');
    T3.sessions = sessions.map(s => ({
      id: s.id, month: s.month, scrap: s.scrap_price, created_at: s.created_at,
      items: (s.repaint_items||[]).map(r => ({
        id: r.id, name: r.name, thickness: r.thickness, size: r.size, qty: r.qty,
        repaint: r.repaint, stdcost: r.stdcost
      }))
    }));
    t3BuildSaved();
    t3RenderResults();
    t3LoadLog(); // [추가] 이력 목록 갱신
  } catch(e) { console.error('실적 로드 오류:', e); }
}
// ── Toast 알림 ──
function t3ShowToast(msg, type) {
  type = type || 'success';
  const old = document.getElementById('t3_toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.id = 't3_toast';
  const bg = type === 'error' ? '#e53e3e' : type === 'warn' ? '#d97706' : '#1a7f37';
  t.style.cssText = [
    'position:fixed', 'top:24px', 'left:50%', 'transform:translateX(-50%)',
    'background:' + bg, 'color:#fff', 'padding:14px 28px', 'border-radius:10px',
    'font-size:15px', 'font-weight:700', 'box-shadow:0 4px 20px rgba(0,0,0,0.22)',
    'z-index:99999', 'pointer-events:none', 'opacity:1', 'transition:opacity 0.4s'
  ].join(';');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2800);
}

// ── 입력창 초기화 ──
function t3ResetForm() {
  T3.inputRows = [
    { name:'', thickness:'', size:'', qty:'', repaint:'', stdcost:'' },
    { name:'', thickness:'', size:'', qty:'', repaint:'', stdcost:'' },
    { name:'', thickness:'', size:'', qty:'', repaint:'', stdcost:'' }
  ];
  T3._editSessionId = null;
  const sv = document.querySelector('#t3_save_btn');
  if (sv) sv.textContent = '💾 저장';
  const monthEl = document.getElementById('t3_sel_month');
  if (monthEl) monthEl.value = String(new Date().getMonth() + 1);
  const scrapEl = document.getElementById('t3_scrap_price');
  if (scrapEl) scrapEl.value = '250';
  t3RenderInput();
}

function t3BuildSaved() {
  const monthMap = {};
  (T3.sessions||[]).forEach(s => {
    if (!monthMap[s.month]) monthMap[s.month] = { month: s.month, scrap: s.scrap, rows: {}, totQty: 0 };
    const m = monthMap[s.month];
    s.items.forEach(r => {
      const key = (r.name||'') + '|' + (r.size||'') + '|' + (r.thickness||'');
      if (!m.rows[key]) m.rows[key] = { name: r.name, thickness: r.thickness, size: r.size, qty: 0, repaint: r.repaint, stdcost: r.stdcost };
      m.rows[key].qty += (+r.qty||0);
    });
  });
  T3.saved = Object.values(monthMap).map(m => ({
    month: m.month, scrap: m.scrap, rows: Object.values(m.rows)
  })).sort((a,b) => a.month - b.month);
}

<script>
// ===================================================
// TAB 3: 재도장 로직 (철의 비중 7.85 보존 + 기능 추가)
// ===================================================
const T3 = { IRON: 7.85, inputRows: [{},{},{}], monthStdCost: {}, sessions: [], saved: [], _editSessionId: null };

async function sb3(path, opt={}) {
    const res = await fetch(SB3 + '/rest/v1/' + path, {
        headers: { 'apikey': KEY3, 'Authorization': 'Bearer ' + KEY3, 'Content-Type': 'application/json', 'Prefer': opt.prefer || 'return=representation' },
        method: opt.method || 'GET', body: opt.body ? JSON.stringify(opt.body) : undefined
    });
    return res.json();
}

async function initTab3() {
    t3ResetForm();
    await t3LoadStdCostFromSB();
    await t3LoadSessions();
    t3ChangeMonth();
}

function t3CalcRow(r, scrap) {
    const m = +document.getElementById('t3_sel_month').value;
    const stdMap = (T3.monthStdCost[m] && T3.monthStdCost[m].data) || {};
    const nm = r.name || '';
    const thick = +r.thickness || (nm === '홈던트기둥' ? 0.8 : (nm.includes('홈던트') ? 1.2 : 0));
    const width = nm === '홈던트기둥' ? 129 : 64;
    const size = +r.size || 0;
    const weight = (thick * width * T3.IRON * size) / 1000000;
    const sAmt = weight * (scrap || 250);
    const key = `${nm}_${r.thickness || ''}_${+size}`;
    const stdData = stdMap[key] || {};
    const repaint = stdData.repaint || +r.repaint || 0;
    const std = stdData.std || +r.stdcost || 0;
    const perPL = std ? (std - repaint - sAmt) : 0;
    return { weight, sAmt, std, repaint, perPL, totPL: perPL * (+r.qty || 0), width };
}

function t3RenderInput() {
    const scrap = +document.getElementById('t3_scrap_price').value || 250;
    document.getElementById('t3_input_tbody').innerHTML = T3.inputRows.map((r, i) => {
        const res = t3CalcRow(r, scrap);
        const ro = (v, f=0) => `<span class="td-mono">${typeof v==='number' ? v.toLocaleString(undefined,{maximumFractionDigits:f}) : (v||'-')}</span>`;
        return `<tr>
            <td style="text-align:center;"><button onclick="t3DelRow(${i})" style="color:red; border:none; background:none; cursor:pointer;">✕</button></td>
            <td class="input-cell"><select onchange="t3CellInput(${i}, 'name', this.value)">
                <option value="">선택</option><option value="홈던트기둥" ${r.name==='홈던트기둥'?'selected':''}>홈던트기둥</option><option value="홈던트받침" ${r.name==='홈던트받침'?'selected':''}>홈던트받침</option><option value="스피드랙기둥" ${r.name==='스피드랙기둥'?'selected':''}>스피드랙기둥</option><option value="스피드랙받침" ${r.name==='스피드랙받침'?'selected':''}>스피드랙받침</option>
            </select></td>
            <td class="input-cell">${t3ThickCell(r, i)}</td>
            <td class="input-cell"><input type="text" value="${r.size||''}" onblur="t3CellInput(${i}, 'size', this.value)" placeholder="규격"></td>
            <td class="input-cell"><input type="text" value="${r.qty||''}" onblur="t3CellInput(${i}, 'qty', this.value)" placeholder="수량"></td>
            <td>7.85</td><td>${res.width}</td><td>${ro(res.weight, 4)}</td><td>${scrap}</td><td>${ro(res.sAmt)}</td>
            <td class="col-blue">${ro(r.repaint)}</td><td class="col-blue">${ro(r.stdcost)}</td>
            <td class="${res.perPL>=0?'col-green':'col-red'}">${ro(res.perPL)}</td>
            <td class="${res.totPL>=0?'col-green':'col-red'}">${ro(res.totPL)}</td>
        </tr>`;
    }).join('');
}

function t3ThickCell(r, i) {
    if (r.name?.includes('홈던트')) return `<span>${r.name==='홈던트기둥'?'0.8':'1.2'}</span>`;
    return `<select onchange="t3CellInput(${i}, 'thickness', this.value)"><option value="">-</option><option value="1.2" ${r.thickness==='1.2'?'selected':''}>1.2</option><option value="1.4" ${r.thickness==='1.4'?'selected':''}>1.4</option><option value="1.8" ${r.thickness==='1.8'?'selected':''}>1.8</option></select>`;
}

function t3CellInput(i, f, v) { 
    T3.inputRows[i][f] = v; 
    if(f==='name') T3.inputRows[i].thickness = v==='홈던트기둥'?'0.8':(v.includes('홈던트')?'1.2':'');
    const r = T3.inputRows[i];
    if (r.name && r.size) {
        const stdMap = (T3.monthStdCost[+document.getElementById('t3_sel_month').value]?.data) || {};
        const key = `${r.name}_${r.thickness||''}_${+r.size}`;
        if (stdMap[key]) { T3.inputRows[i].stdcost = stdMap[key].std; T3.inputRows[i].repaint = stdMap[key].repaint; }
    }
    t3RenderInput(); 
}
function t3AddRow() { T3.inputRows.push({}); t3RenderInput(); }
function t3DelRow(i) { T3.inputRows.splice(i, 1); t3RenderInput(); }

async function t3SaveMonth() {
    const m = +document.getElementById('t3_sel_month').value;
    const scrap = +document.getElementById('t3_scrap_price').value;
    const valid = T3.inputRows.filter(r => r.name && r.size && r.qty);
    if(!valid.length) return alert('입력된 내용이 없습니다.');
    try {
        if(T3._editSessionId) {
            await sb3(`repaint_sessions?id=eq.${T3._editSessionId}`, { method: 'PATCH', body: { month: m, scrap_price: scrap } });
            await sb3(`repaint_items?session_id=eq.${T3._editSessionId}`, { method: 'DELETE', prefer: '' });
            const items = valid.map(r => ({ session_id: T3._editSessionId, name: r.name, thickness: r.thickness, size: +r.size, qty: +r.qty, repaint: +r.repaint||0, stdcost: +r.stdcost||0 }));
            await sb3('repaint_items', { method: 'POST', body: items });
        } else {
            const sess = await sb3('repaint_sessions', { method: 'POST', body: { month: m, scrap_price: scrap } });
            const items = valid.map(r => ({ session_id: sess[0].id, name: r.name, thickness: r.thickness, size: +r.size, qty: +r.qty, repaint: +r.repaint||0, stdcost: +r.stdcost||0 }));
            await sb3('repaint_items', { method: 'POST', body: items });
        }
        t3ShowToast('✅ 저장 완료'); T3._editSessionId = null; await initTab3();
    } catch(e) { alert('저장 중 오류 발생'); }
}

function t3RenderResults() {
    const wrap = document.getElementById('t3_results_wrap');
    wrap.innerHTML = T3.saved.map(s => {
        let totalPL = 0;
        const rows = s.rows.map(r => {
            const res = t3CalcRow(r, s.scrap); totalPL += res.totPL;
            return `<tr><td>${r.name}</td><td>${r.size}</td><td>${r.thickness}</td><td>${(+r.qty).toLocaleString()}</td><td>${res.weight.toFixed(4)}</td><td class="${res.totPL>=0?'col-green':'col-red'}">${Math.round(res.totPL).toLocaleString()}원</td></tr>`;
        }).join('');
        return `<div class="panel"><b>${s.month}월 누적 실적</b> <span style="float:right; font-weight:bold; color:var(--accent);">총 손익: ${Math.round(totalPL).toLocaleString()}원</span>
                <div class="table-wrap"><table><thead><tr><th>품명</th><th>규격</th><th>두께</th><th>수량</th><th>무게</th><th>총손익</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }).join('');
}

function t3LoadLog() {
    const el = document.getElementById('t3_log_content');
    el.innerHTML = T3.sessions.map(s => {
        const summary = (s.items || []).map(r => `${r.name} ${r.size}(${r.qty})`).join(', ');
        return `<div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; background:#fff; margin-bottom:5px; border-radius:10px;">
            <div><b style="color:var(--accent);">${s.month}월 실적</b> <small style="color:#888;">(${new Date(s.created_at).toLocaleString()})</small><br>
            <small style="color:#666;">상세: ${summary || '데이터 없음'}</small></div>
            <div style="display:flex; gap:8px;">
                <button onclick="t3Edit(${s.id})" style="padding:6px 12px; cursor:pointer; background:#fff; border:1px solid #ddd; border-radius:6px; font-size:12px; font-weight:bold;">수정</button>
                <button onclick="t3Delete(${s.id})" style="padding:6px 12px; cursor:pointer; background:#fff; border:1px solid #ffcfcf; color:red; border-radius:6px; font-size:12px; font-weight:bold;">삭제</button>
            </div>
        </div>`;
    }).join('');
}

async function t3Delete(sid) {
    if(!confirm('정말로 이 실적 기록을 삭제하시겠습니까?')) return;
    try {
        await sb3(`repaint_items?session_id=eq.${sid}`, { method: 'DELETE', prefer: '' });
        await sb3(`repaint_sessions?id=eq.${sid}`, { method: 'DELETE', prefer: '' });
        t3ShowToast('🗑️ 실적이 삭제되었습니다.'); await initTab3();
    } catch(e) { alert('삭제 오류'); }
}

function t3Edit(sid) {
    const s = T3.sessions.find(x => x.id === sid);
    T3._editSessionId = sid; T3.inputRows = JSON.parse(JSON.stringify(s.items || []));
    document.getElementById('t3_sel_month').value = s.month;
    document.getElementById('t3_scrap_price').value = s.scrap;
    t3RenderInput(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

function t3ChangeMonth() {
    const m = +document.getElementById('t3_sel_month').value;
    document.getElementById('t3_std_status').textContent = T3.monthStdCost[m] ? `✅ ${m}월 표준원가 적용 중` : `⚠️ ${m}월 표준원가 없음`;
    t3RenderInput();
}

function t3UpdateStdSavedList() {
    const el = document.getElementById('t3_std_saved_list');
    if(el) el.innerHTML = Object.keys(T3.monthStdCost).sort((a,b)=>a-b).map(m => `<span class="tag">📋 ${m}월</span>`).join('');
}

function t3RenderStats() {}
function t3LogToggle() {}

// ===================================================
// TAB 2: 리퍼 실적 로직 (보존)
// ===================================================
let t2Year = 2026; let t2SelMonth = null; let _t2MonCache = null;
async function t2SbFetch(path, opt={}) {
    const res = await fetch(SB3 + '/rest/v1/' + path, {
        headers: { 'apikey': KEY3, 'Authorization': 'Bearer ' + KEY3, 'Content-Type': 'application/json', 'Prefer': opt.prefer || 'return=representation' },
        method: opt.method || 'GET', body: opt.body ? JSON.stringify(opt.body) : undefined
    });
    return res.json();
}
async function t2MonLoadSB() {
    try {
        const rows = await t2SbFetch('refurb_monthly?select=*');
        const obj = {}; (rows || []).forEach(r => { obj[r.month_key] = r; });
        _t2MonCache = obj; t2UpdateDashboard();
    } catch(e) { console.error('T2 로드 실패'); }
}
function t2UpdateDashboard() {
    const yearStr = String(t2Year); document.getElementById('t2AnnualYear').textContent = t2Year; document.getElementById('t2YearLabel').textContent = t2Year;
    let annualAmt = 0; const container = document.getElementById('t2MonthTabs');
    if (container) {
        container.innerHTML = Array.from({length:12}, (_, i) => {
            const mm = String(i + 1).padStart(2, '0'); const mkey = yearStr + '-' + mm;
            const d = (_t2MonCache && _t2MonCache[mkey]) || { amount: 0 }; annualAmt += d.amount;
            return `<button class="t2-mtab ${t2SelMonth === mkey ? 'active' : ''}" onclick="t2SelectMonth('${mkey}')">${i+1}월</button>`;
        }).join('');
    }
    document.getElementById('t2AnnualAmt').textContent = annualAmt.toLocaleString();
}
function t2SelectMonth(key) {
    t2SelMonth = key; document.getElementById('t2MonthInputPanel').style.display = 'block';
    const d = (_t2MonCache && _t2MonCache[key]) || { pkg: 0, qty: 0, amount: 0 };
    document.getElementById('t2InputPkg').value = d.pkg; document.getElementById('t2InputQty').value = d.qty; document.getElementById('t2InputAmt').value = d.amount;
    t2UpdateDashboard();
}
async function t2SaveMonthly() {
    if (!t2SelMonth) return;
    const body = { month_key: t2SelMonth, pkg: +document.getElementById('t2InputPkg').value, qty: +document.getElementById('t2InputQty').value, amount: +document.getElementById('t2InputAmt').value };
    await t2SbFetch('refurb_monthly?month_key=eq.' + t2SelMonth, { method: 'DELETE', prefer: '' });
    await t2SbFetch('refurb_monthly', { method: 'POST', body });
    t3ShowToast('✅ 리퍼 실적 저장 완료'); await t2MonLoadSB();
}
function t2ShiftYear(v) { t2Year += v; t2UpdateDashboard(); }

// ===================================================
// TAB 4 & 5 연결 브릿지
// ===================================================
async function fetchAllRows4(table) {
    const res = await fetch(`${SB4}/rest/v1/${table}?select=*`, { headers: { 'apikey': KEY4, 'Authorization': `Bearer ${KEY4}` } });
    return res.json();
}
function initDashboard4() {
    Promise.all([fetchAllRows4('frame_return_items'), fetchAllRows4('rack_return_items')]).then(res => {
        const all = res[0].concat(res[1]);
        const tin = all.reduce((s,x) => s+(+x.received_quantity||0), 0);
        const tdis = all.reduce((s,x) => s+(+x.dispose_quantity||0), 0);
        document.getElementById('v4-dashboard-root').innerHTML = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px;">
            <div class="panel" style="text-align:center;"><b>총 입고</b><br>${tin.toLocaleString()}</div>
            <div class="panel" style="text-align:center;"><b>총 폐기</b><br>${tdis.toLocaleString()}</div>
            <div class="panel" style="text-align:center;"><b>폐기율</b><br>${tin?(tdis/tin*100).toFixed(1):0}%</div>
        </div>`;
    });
}
async function certLoadAll() {
    const res = await fetch(`${SB5}/rest/v1/cert_folders?select=*,cert_files(*)&order=created_at.asc`, { headers: { 'apikey': KEY5, 'Authorization': `Bearer ${KEY5}` } });
    const folders = await res.json();
    ['1','2'].forEach(idx => {
        const cat = { '1': 'mechanics', '2': 'chemistry' }[idx];
        const el = document.getElementById('cert-folders-' + idx);
        if(el) el.innerHTML = folders.filter(f => f.category === cat).map(f => `<div>📁 ${f.name} (${f.cert_files.length})</div>`).join('');
    });
}
function initTab5() { certLoadAll(); }
function certToggle(idx) { document.getElementById('cert-body-'+idx).classList.toggle('open'); }

function t2Init() { t2MonLoadSB(); }
window.onload = () => { t2Init(); initTab3(); };
</script>
